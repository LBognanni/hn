<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0d0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="HN">
<meta name="description" content="Hacker News — lean PWA reader">
<title>HN</title>
<link rel="manifest" href="manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&display=swap');

:root {
  --bg:      #0d0d0d;
  --bg2:     #141414;
  --bg3:     #1c1c1c;
  --border:  #2a2a2a;
  --accent:  #ff6600;
  --text:    #e8e0d0;
  --text2:   #888;
  --text3:   #444;
  --link:    #c8b89a;
  --green:   #4caf6a;
  --mono:    'JetBrains Mono', monospace;
  --serif:   'Fraunces', serif;
  --r:       3px;
  --safe-top: env(safe-area-inset-top);
  --safe-bot: env(safe-area-inset-bottom);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--mono);
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  overscroll-behavior-y: contain;
}

/* HEADER */
#header {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: calc(10px + var(--safe-top)) 14px 10px;
  display: flex; align-items: center; gap: 10px;
}
#logo {
  font-family: var(--serif);
  font-weight: 300;
  font-size: 1.25rem;
  color: var(--accent);
  letter-spacing: -0.02em;
  flex-shrink: 0;
}
.tabs { display: flex; gap: 3px; flex-wrap: wrap; flex: 1; }
.tab {
  font-family: var(--mono);
  font-size: 0.6rem;
  font-weight: 500;
  padding: 4px 7px;
  border: 1px solid var(--border);
  border-radius: var(--r);
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  -webkit-tap-highlight-color: transparent;
  transition: all 0.1s;
}
.tab.active { background: var(--accent); color: #000; border-color: var(--accent); }

/* PTR */
#ptr {
  height: 0; overflow: hidden;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  font-size: 0.62rem; color: var(--text2);
  letter-spacing: 0.1em; text-transform: uppercase;
  transition: height 0.15s;
}
#ptr.visible { height: 42px; }
.ptr-spin {
  width: 12px; height: 12px;
  border: 1.5px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: none;
}
#ptr.loading .ptr-spin { display: block; }

/* FILTER BAR */
#filter-bar {
  padding: 7px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
  font-size: 0.62rem; color: var(--text2);
  letter-spacing: 0.05em; text-transform: uppercase;
}
#score-filter {
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--mono);
  font-size: 0.68rem;
  padding: 3px 8px;
  border-radius: var(--r);
  width: 60px;
}
#story-count { margin-left: auto; color: var(--text3); }

/* FEED */
#feed { padding-bottom: calc(24px + var(--safe-bot)); }

.story {
  border-bottom: 1px solid var(--border);
  padding: 11px 14px;
  display: grid;
  grid-template-columns: 30px 1fr;
  gap: 0 9px;
  -webkit-tap-highlight-color: transparent;
  cursor: pointer;
  animation: fadeUp 0.18s ease both;
}
.story:active { background: var(--bg2); }
.rank { font-size: 0.65rem; color: var(--text3); padding-top: 2px; text-align: right; }
.s-title {
  font-family: var(--serif);
  font-size: 0.93rem;
  font-weight: 300;
  line-height: 1.35;
  margin-bottom: 5px;
}
.story.read .s-title { color: var(--text3); }
.story.unread .s-title { color: var(--text); }
.domain {
  font-family: var(--mono);
  font-size: 0.58rem;
  color: var(--text3);
  margin-left: 5px;
  vertical-align: middle;
  font-weight: 400;
}
.s-meta {
  font-size: 0.6rem;
  color: var(--text2);
  display: flex; flex-wrap: wrap; gap: 0 9px;
  line-height: 1.7;
}
.pts { color: var(--accent); font-weight: 500; }
.cmt-btn {
  background: none; border: none;
  font-family: var(--mono); font-size: 0.6rem;
  color: var(--link); cursor: pointer; padding: 0;
  -webkit-tap-highlight-color: transparent;
}
.cmt-btn:active { color: var(--accent); }
.dot {
  display: inline-block;
  width: 5px; height: 5px;
  background: var(--accent);
  border-radius: 50%;
  margin-right: 4px;
  vertical-align: middle;
}

/* STATUS */
#status {
  text-align: center;
  padding: 64px 20px;
  color: var(--text2);
  font-size: 0.72rem;
  letter-spacing: 0.05em;
  line-height: 2;
}
#status.err { color: #e05555; }
#status .ico { font-size: 1.6rem; display: block; margin-bottom: 8px; }

/* DRAWER */
#overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 200; opacity: 0; pointer-events: none;
  transition: opacity 0.22s;
}
#overlay.open { opacity: 1; pointer-events: all; }
#drawer {
  position: fixed; inset: 0;
  background: var(--bg);
  z-index: 201;
  transform: translateY(100%);
  transition: transform 0.28s cubic-bezier(0.32, 0.72, 0, 1);
  display: flex; flex-direction: column; overflow: hidden;
}
#drawer.open { transform: translateY(0); }
#d-head {
  padding: 10px 42px 10px 14px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#d-title {
  font-family: var(--serif);
  font-size: 0.88rem;
  font-weight: 300;
  line-height: 1.3;
  margin-bottom: 4px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  color: inherit;
  text-decoration: none;
}
#d-title[href]:hover { text-decoration: underline; text-decoration-color: var(--text3); }
#d-title[href] { cursor: pointer; }
#d-meta { font-size: 0.58rem; color: var(--text2); display: flex; gap: 8px; }
#d-close {
  position: absolute; top: 10px; right: 12px;
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text2); font-family: var(--mono); font-size: 0.65rem;
  width: 26px; height: 26px; border-radius: var(--r);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
#d-link {
  display: block;
  margin: 8px 14px 0;
  padding: 5px 8px;
  font-size: 0.62rem;
  color: var(--link);
  text-decoration: none;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  flex-shrink: 0;
  letter-spacing: 0.02em;
}
#d-link:active { background: var(--bg3); }
#d-scroll {
  overflow-y: auto;
  flex: 1;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(20px + var(--safe-bot));
}

/* COMMENTS */
.comment {
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  position: relative;
}
.comment::before {
  content: '';
  position: absolute;
  left: calc(14px + var(--d) * 13px - 6px);
  top: 0; bottom: 0; width: 1px;
  background: var(--border);
}
.comment[data-d="0"]::before { display: none; }
.c-head {
  display: flex; align-items: center; gap: 7px;
  margin-bottom: 3px;
  padding-left: calc(var(--d) * 13px);
  user-select: none;
}
.c-by { font-size: 0.6rem; font-weight: 500; color: var(--accent); }
.c-by.op { color: var(--green); }
.c-age { font-size: 0.57rem; color: var(--text3); }
.comment {
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.comment:active { background: var(--bg2); }
.c-body {
  padding-left: calc(var(--d) * 13px);
  font-family: var(--serif);
  font-size: 0.82rem;
  font-weight: 300;
  line-height: 1.55;
  color: var(--text);
  word-break: break-word;
}
.c-body a { color: var(--link); }
.c-body pre, .c-body code {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--r); font-family: var(--mono);
  font-size: 0.7rem;
}
.c-body pre { padding: 7px; overflow-x: auto; margin: 5px 0; }
.c-body code { padding: 1px 4px; }
.c-body p { margin-bottom: 4px; }
.c-body p:last-child { margin: 0; }
.comment.col .c-body { display: none; }
.c-col-info {
  padding-left: calc(var(--d) * 13px);
  font-size: 0.56rem; color: var(--text3); margin-top: 1px;
  display: none;
}
.comment.col .c-col-info { display: block; }

#c-loading {
  text-align: center; padding: 40px 20px;
  color: var(--text2); font-size: 0.68rem;
  letter-spacing: 0.05em;
}

/* OFFLINE */
#offline {
  position: fixed;
  bottom: calc(14px + var(--safe-bot)); left: 50%;
  transform: translateX(-50%) translateY(70px);
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 20px; padding: 5px 14px;
  font-size: 0.6rem; color: var(--text2);
  letter-spacing: 0.05em; z-index: 300;
  transition: transform 0.28s; white-space: nowrap;
}
#offline.show { transform: translateX(-50%) translateY(0); }

/* ANIMATIONS */
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(5px); }
  to   { opacity: 1; transform: none; }
}
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div id="header">
  <div id="logo">HN</div>
  <div class="tabs">
    <button class="tab active" data-feed="front_page">top</button>
    <button class="tab" data-feed="newest">new</button>
    <button class="tab" data-feed="best">best</button>
    <button class="tab" data-feed="ask_hn">ask</button>
    <button class="tab" data-feed="show_hn">show</button>
  </div>
</div>

<div id="ptr">
  <div class="ptr-spin"></div>
  <span id="ptr-txt">pull to refresh</span>
</div>

<div id="filter-bar">
  <label for="score-filter">min pts</label>
  <input id="score-filter" type="number" value="50" min="0" max="9999" step="10">
  <span id="story-count"></span>
</div>

<div id="feed">
  <div id="status"><span class="ico">◌</span>loading…</div>
</div>

<div id="overlay"></div>
<div id="drawer">
  <div id="d-head">
    <a id="d-title" target="_blank" rel="noopener noreferrer"></a>
    <div id="d-meta"></div>
    <button id="d-close">✕</button>
  </div>
  <a id="d-link" target="_blank" rel="noopener noreferrer">&#x2197; open article</a>
  <div id="d-scroll">
    <div id="c-loading">loading comments…</div>
  </div>
</div>

<div id="offline">&#x26A1; offline — cached stories</div>

<script>
const ALGOLIA  = 'https://hn.algolia.com/api/v1';
const HN_ITEMS = 'https://hacker-news.firebaseio.com/v0/item';
const CACHE_PFX = 'hn3_';
const READ_KEY  = 'hn3_read';
const SCORE_KEY = 'hn3_score';

const FEED_TAGS = {
  front_page: 'front_page',
  newest:     'story',
  best:       'story',
  ask_hn:     'ask_hn',
  show_hn:    'show_hn',
};

let currentFeed = 'front_page';
let stories     = [];
let readIds     = new Set(JSON.parse(localStorage.getItem(READ_KEY) || '[]'));
let minScore    = parseInt(localStorage.getItem(SCORE_KEY) || '50');
let busy        = false;

const feedEl    = document.getElementById('feed');
const statusEl  = document.getElementById('status');
const scoreEl   = document.getElementById('score-filter');
const countEl   = document.getElementById('story-count');
const ptrEl     = document.getElementById('ptr');
const ptrTxt    = document.getElementById('ptr-txt');
const drawer    = document.getElementById('drawer');
const overlay   = document.getElementById('overlay');
const dTitle    = document.getElementById('d-title');
const dMeta     = document.getElementById('d-meta');
const dClose    = document.getElementById('d-close');
const dLink     = document.getElementById('d-link');
const dScroll   = document.getElementById('d-scroll');
const offlineEl = document.getElementById('offline');

scoreEl.value = minScore;

const esc = s => String(s)
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

const ago = t => {
  const s = Math.floor(Date.now()/1000 - t);
  if (s < 60) return s+'s';
  if (s < 3600) return Math.floor(s/60)+'m';
  if (s < 86400) return Math.floor(s/3600)+'h';
  return Math.floor(s/86400)+'d';
};

const host = url => {
  if (!url) return '';
  try { return new URL(url).hostname.replace(/^www\./,''); }
  catch { return ''; }
};

const cacheSet = (k, v) => {
  try { localStorage.setItem(CACHE_PFX+k, JSON.stringify(v)); } catch {}
};
const cacheGet = k => {
  try { return JSON.parse(localStorage.getItem(CACHE_PFX+k)); }
  catch { return null; }
};

// Algolia returns full story data in a SINGLE request — no per-item fetching
const fetchStories = async (feedName) => {
  const tag      = FEED_TAGS[feedName];
  const sort     = feedName === 'newest' ? 'search_by_date' : 'search';
  const since    = Math.floor(Date.now()/1000) - 86400; // last 24h
  const url      = `${ALGOLIA}/${sort}?tags=${tag}&hitsPerPage=60&numericFilters=created_at_i>${since}`;
  const r    = await fetch(url);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const json = await r.json();
  return (json.hits || []).map(h => ({
    id:          parseInt(h.objectID),
    title:       h.title || '(untitled)',
    url:         h.url   || null,
    score:       h.points || 0,
    by:          h.author || '',
    time:        h.created_at_i || 0,
    descendants: h.num_comments || 0,
  }));
};

const showStatus = (ico, msg, isErr) => {
  feedEl.innerHTML = '';
  statusEl.style.display = '';
  statusEl.className = isErr ? 'err' : '';
  statusEl.innerHTML = `<span class="ico">${ico}</span>${msg}`;
};

const renderFeed = () => {
  const filtered = stories
    .filter(s => s.score >= minScore)
    .sort((a, b) => b.descendants - a.descendants);
  countEl.textContent = filtered.length + ' stories';
  if (!filtered.length) {
    showStatus('&#x25EF;', `no stories above ${minScore} pts`, false);
    return;
  }
  statusEl.style.display = 'none';
  feedEl.innerHTML = filtered.map((s, i) => {
    const isRead = readIds.has(s.id);
    const d      = host(s.url);
    return `<div class="story ${isRead?'read':'unread'}" data-id="${s.id}"
              style="animation-delay:${Math.min(i*.025,.5)}s"
              onclick="storyClick(event,${s.id})">
      <div class="rank">${i+1}</div>
      <div>
        <div class="s-title">${isRead?'':'<span class="dot"></span>'}${esc(s.title)}${
          d?`<span class="domain">${esc(d)}</span>`:''}</div>
        <div class="s-meta">
          <span class="pts">&#x25B2; ${s.score}</span>
          <span>${ago(s.time)}</span>
          <span>${esc(s.by)}</span>
          <button class="cmt-btn" onclick="openComments(event,${s.id})">
            &#x25CE; ${s.descendants}
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
};

const load = async () => {
  if (busy) return;
  busy = true;
  showStatus('&#x25CC;', 'loading\u2026', false);
  const cached = cacheGet('s_' + currentFeed);
  if (cached) {
    stories = cached;
    renderFeed();
  }
  try {
    const fresh = await fetchStories(currentFeed);
    stories = fresh;
    cacheSet('s_' + currentFeed, fresh);
    renderFeed();
  } catch (err) {
    console.error(err);
    if (!cached) showStatus('&#x2715;', 'failed to load — check connection', true);
    else flashOffline();
  }
  busy = false;
};

const markRead = id => {
  readIds.add(id);
  try { localStorage.setItem(READ_KEY, JSON.stringify([...readIds])); } catch {}
  const el = feedEl.querySelector(`.story[data-id="${id}"]`);
  if (el) { el.classList.remove('unread'); el.classList.add('read'); }
};

window.storyClick = (e, id) => {
  if (e.target.closest('.cmt-btn')) return;
  openComments(e, id);
};

window.openComments = async (e, id) => {
  if (e) e.stopPropagation();
  markRead(id);
  const s = stories.find(x => x.id === id);
  if (!s) return;
  dTitle.textContent = s.title;
  if (s.url) { dTitle.href = s.url; } else { dTitle.removeAttribute('href'); }
  dMeta.innerHTML = `<span>&#x25B2; ${s.score}</span>
    <span>${s.descendants} comments</span>
    <span>${esc(s.by)}</span>
    <span>${ago(s.time)}</span>`;
  if (s.url) {
    dLink.href = s.url;
    dLink.textContent = '\u2197 ' + (host(s.url) || 'open article');
    dLink.style.display = 'block';
  } else {
    dLink.style.display = 'none';
  }
  dScroll.innerHTML = '<div id="c-loading">loading comments\u2026</div>';
  openDrawer();

  try {
    // Single Algolia request for ALL comments — replaces the old Firebase waterfall
    const url  = `${ALGOLIA}/search?tags=comment,story_${id}&hitsPerPage=500`;
    const r    = await fetch(url);
    const json = await r.json();
    const hits = (json.hits || []).filter(h => h.author && !h._deleted_);

    if (!hits.length) {
      dScroll.innerHTML = '<div id="c-loading">no comments yet</div>';
      return;
    }

    // Index by id for fast parent lookups
    const byId = {};
    hits.forEach(h => { byId[h.objectID] = h; });

    // Build children map keyed by parent_id
    const childrenOf = {};
    hits.forEach(h => {
      const p = String(h.parent_id);
      if (!childrenOf[p]) childrenOf[p] = [];
      childrenOf[p].push(h);
    });

    // DFS walk from story root to get correct thread order with real depths
    const flat = [];
    const walk = (parentId, depth) => {
      (childrenOf[parentId] || []).forEach(h => {
        flat.push({
          id:   h.objectID,
          by:   h.author,
          text: h.comment_text || '',
          time: h.created_at_i || 0,
          depth,
          isOp: h.author === s.by,
        });
        walk(h.objectID, depth + 1);
      });
    };
    walk(String(id), 0);

    dScroll.innerHTML = flat.length
      ? flat.map(renderComment).join('')
      : '<div id="c-loading">no visible comments</div>';
  } catch (err) {
    console.error(err);
    dScroll.innerHTML = '<div id="c-loading">failed to load comments</div>';
  }
};

const renderComment = c => `
  <div class="comment" data-id="${c.id}" data-d="${c.depth}" style="--d:${c.depth}" onclick="tog(this)">
    <div class="c-head">
      <span class="c-by${c.isOp?' op':''}">${esc(c.by)}${c.isOp?' \u2605':''}</span>
      <span class="c-age">${ago(c.time)}</span>
    </div>
    <div class="c-body">${c.text||''}</div>
    <div class="c-col-info">thread collapsed</div>
  </div>`;

window.tog = el => {
  const c     = el;
  const depth = parseInt(c.dataset.d);
  const col   = c.classList.toggle('col');
  let next = c.nextElementSibling;
  while (next && next.classList.contains('comment')) {
    if (parseInt(next.dataset.d) <= depth) break;
    next.style.display = col ? 'none' : '';
    next = next.nextElementSibling;
  }
};

const openDrawer = () => {
  drawer.classList.add('open');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
};
const closeDrawer = () => {
  drawer.classList.remove('open');
  overlay.classList.remove('open');
  document.body.style.overflow = '';
};
dClose.addEventListener('click', closeDrawer);
overlay.addEventListener('click', closeDrawer);

let tsY = 0;
drawer.addEventListener('touchstart', e => { tsY = e.touches[0].clientY; }, {passive:true});
drawer.addEventListener('touchend', e => {
  if (e.changedTouches[0].clientY - tsY > 80 && dScroll.scrollTop === 0) closeDrawer();
}, {passive:true});

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelector('.tab.active').classList.remove('active');
    btn.classList.add('active');
    currentFeed = btn.dataset.feed;
    stories = [];
    load();
  });
});

scoreEl.addEventListener('change', () => {
  minScore = parseInt(scoreEl.value) || 0;
  localStorage.setItem(SCORE_KEY, minScore);
  renderFeed();
});

let ptrY = 0, ptrOn = false, ptrFired = false;
document.addEventListener('touchstart', e => {
  if (window.scrollY === 0 && !drawer.classList.contains('open')) {
    ptrY = e.touches[0].clientY; ptrOn = true; ptrFired = false;
  }
}, {passive:true});
document.addEventListener('touchmove', e => {
  if (!ptrOn) return;
  const dy = e.touches[0].clientY - ptrY;
  if (dy > 10) {
    ptrEl.classList.add('visible');
    ptrEl.classList.remove('loading');
    ptrTxt.textContent = dy > 75 ? 'release to refresh' : 'pull to refresh';
    if (dy > 75) ptrFired = true;
  }
}, {passive:true});
document.addEventListener('touchend', async () => {
  if (!ptrOn) return;
  ptrOn = false;
  if (ptrFired) {
    ptrEl.classList.add('loading');
    ptrTxt.textContent = 'refreshing\u2026';
    await load();
    ptrEl.classList.remove('visible', 'loading');
  } else {
    ptrEl.classList.remove('visible');
  }
  ptrFired = false;
}, {passive:true});

const flashOffline = () => {
  offlineEl.classList.add('show');
  setTimeout(() => offlineEl.classList.remove('show'), 3000);
};
window.addEventListener('offline', flashOffline);

if ('serviceWorker' in navigator) {
  const sw = `
const V='hn-v3';
self.addEventListener('install',()=>self.skipWaiting());
self.addEventListener('activate',e=>{
  e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==V).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch',e=>{
  const u=new URL(e.request.url);
  if(u.hostname.includes('firebaseio')||u.hostname.includes('algolia'))return;
  if(u.hostname.includes('gstatic')||u.hostname.includes('googleapis')){
    e.respondWith(caches.open(V).then(c=>c.match(e.request).then(h=>h||fetch(e.request).then(r=>{c.put(e.request,r.clone());return r;}))));
    return;
  }
  e.respondWith(caches.match(e.request).then(h=>h||fetch(e.request)));
});`;
  const blob = new Blob([sw], {type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}

load();
</script>
