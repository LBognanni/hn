<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0d0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="HN">
<meta name="description" content="Hacker News — lean PWA reader">
<title>HN</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="logo.svg" type="image/svg+xml">
<link rel="icon" href="favicon-32.png" type="image/png" sizes="32x32">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="ptr">
  <div class="ptr-spin"></div>
  <span id="ptr-txt">pull to refresh</span>
</div>

<div id="feed">
  <div id="status"><span class="ico">◌</span>loading…</div>
</div>

<div id="overlay"></div>
<div id="drawer">
  <div id="d-head">
    <a id="d-title" target="_blank" rel="noopener noreferrer"></a>
    <div id="d-meta"></div>
    <button id="d-close">✕</button>
  </div>
  <a id="d-link" target="_blank" rel="noopener noreferrer">&#x2197; open article</a>
  <div id="d-scroll">
    <div id="c-loading">loading comments…</div>
  </div>
</div>

<div id="header">
  <div id="logo">HN</div>
  <div id="date-nav">
    <button class="nav-btn" id="btn-prev">&#x2190;</button>
    <span id="date-label"></span>
    <button class="nav-btn" id="btn-next">&#x2192;</button>
  </div>
</div>

<div id="offline">&#x26A1; offline — cached stories</div>

<script src="app.js"></script>
</body>
</html>
